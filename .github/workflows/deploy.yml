name: Build e Deploy no Azure
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar codigo
      uses: actions/checkout@v3
    - name: Login no ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
    - name: Build e Push Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/projeto-azure:latest
    - name: Deploy Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: webapp-nakan25
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/projeto-azure:latest
